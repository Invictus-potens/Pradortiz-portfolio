<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site Vue — Pradortiz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css" />
  <style>
    body { margin-top: 50px; background-color: #f8f9fa; }
    .header { margin-bottom: 4rem; text-align: center; }
    .status-card {
      padding: 2rem;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #e1e1e1;
      text-align: center;
    }
    footer { margin-top: 5rem; padding-bottom: 3rem; text-align: center; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Site em Vue</h2>
      <p style="color:#888;">Substitua este arquivo pelo build do seu projeto Vue.</p>
    </div>
    <div class="row">
      <div class="twelve columns">
        <div class="status-card">
          <h5>&#9888; Projeto em construção</h5>
          <p>Coloque aqui o conteúdo do build (<code>npm run build</code>) gerado pelo seu projeto Vue 3.</p>
          <a class="button" href="/">&#8592; Voltar ao portfolio</a>
        </div>
      </div>
    </div>
  </div>
  <footer><p>Pradortiz &amp; Dev</p></footer>
</body>
</html>
